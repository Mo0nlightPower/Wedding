<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alvin 和 Kiki的婚禮相簿</title>
    <style>
        /* 氣質風格基礎設定 */
        body {
            font-family: 'Noto Serif TC', 'Times New Roman', serif;
            background-color: #FBF9F6;
            color: #4A4036;
            margin: 0;
            padding: 0;
        }

        /* --- 頂部標題區：固定、毛玻璃與動態縮小 --- */
        .header-container {
            position: sticky;
            top: 0;
            z-index: 1000;
            background-color: rgba(251, 249, 246, 0.85); /* 半透明底色 */
            backdrop-filter: blur(12px); /* 氣質毛玻璃效果 */
            -webkit-backdrop-filter: blur(12px); /* 支援 iOS */
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid transparent;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); /* 平滑過渡動畫 */
        }

        /* 滾動後的標題狀態 */
        .header-container.scrolled {
            padding: 12px 20px;
            background-color: rgba(251, 249, 246, 0.95);
            border-bottom: 1px solid rgba(209, 192, 168, 0.5);
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }

        h1 {
            font-size: 1.8rem;
            letter-spacing: 4px;
            font-weight: normal;
            margin: 0 0 10px 0;
            transition: all 0.4s ease;
        }

        .header-container.scrolled h1 {
            font-size: 1.1rem;
            margin: 0 0 4px 0;
            letter-spacing: 3px;
        }

        p.subtitle {
            font-size: 0.9rem;
            letter-spacing: 2px;
            color: #7A6B5D;
            margin: 0;
            transition: all 0.4s ease;
        }

        .header-container.scrolled p.subtitle {
            font-size: 0.75rem;
        }

        /* --- 單欄相片牆與效能優化 --- */
        .gallery-container {
            max-width: 600px; 
            margin: 20px auto 60px auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            align-items: center;
        }

        .gallery-item {
            width: 100%;
            /* 效能關鍵：預先撐開 4.5:3 (約 2:3) 的直式空間，防止高度塌陷 */
            aspect-ratio: 2 / 3; 
            background-color: #F3EBE1; /* 莫蘭迪裸粉作為載入前的骨架屏 */
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 6px 16px rgba(0,0,0,0.06);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 確保照片不變形，填滿容器 */
            display: block;
            opacity: 0; /* 初始透明 */
            transform: scale(1.05); /* 稍微放大，搭配淡入縮小的動畫感 */
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        /* 圖片載入完成後由 JS 加入的類別 */
        .gallery-item img.loaded {
            opacity: 1;
            transform: scale(1);
        }
    </style>
</head>
<body>

    <div class="header-container" id="main-header">
        <h1>OUR WEDDING</h1>
        <p class="subtitle">Alvin & Kiki</p>
    </div>
    
    <div class="gallery-container" id="photo-gallery">
        </div>

    <script>
        // 1. 處理標題滾動縮小特效
        const header = document.getElementById('main-header');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 30) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        // 2. 處理相片生成與平滑淡入
        const totalPhotos = 103;
        const gallery = document.getElementById('photo-gallery');

        for(let i = 1; i <= totalPhotos; i++) {
            const div = document.createElement('div');
            div.className = 'gallery-item';
            
            const img = document.createElement('img');
            img.src = `image/image_${i}.jpg`; 
            img.loading = 'lazy'; // 原生延遲載入機制
            img.alt = `Wedding Photo ${i}`;
            
            // 監聽圖片是否下載完成，完成後加上 loaded 類別觸發 CSS 動畫
            img.onload = () => {
                img.classList.add('loaded');
            };
            
            div.appendChild(img);
            gallery.appendChild(div);
        }
    </script>
</body>
</html>
